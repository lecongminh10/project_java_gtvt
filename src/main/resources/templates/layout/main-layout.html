<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.springframework.org/security/tags">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE | ELC Management System">Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin-style.css}">
</head>
<body>

<div id="wrapper">
    <!-- SIDEBAR - Hiển thị tùy theo role -->
    <aside id="sidebar-wrapper" class="sidebar">
        <!-- Admin Sidebar -->
        <div th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
            <div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>
        </div>
        
        <!-- Teacher Sidebar -->
        <div th:if="${#authorization.expression('hasRole(''TEACHER'')')}">
            <div th:replace="~{teacher/fragments/sidebar :: sidebar}"></div>
        </div>
    </aside>

    <!-- PAGE CONTENT -->
    <div id="page-content-wrapper">
        <!-- TOPBAR - Chung cho cả hai -->
        <div th:replace="~{admin/fragments/navbar :: navbar}"></div>

        <!-- MAIN CONTENT -->
        <main class="page-content">
            <div layout:fragment="content"></div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const toggle = document.getElementById('sidebarToggle');
        if (toggle) {
            toggle.addEventListener('click', () => {
                document.body.classList.toggle('sb-sidenav-toggled');
            });
        }
    });
</script>
</body>
</html>
