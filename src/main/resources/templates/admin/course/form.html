<div layout:decorate="~{admin/layout/admin-layout}">
<div layout:fragment="content">

    <!-- Page Header -->
    <div class="page-header d-flex flex-wrap justify-content-between align-items-center gap-2">
        <div>
            <h1 th:text="${pageTitle}">Khóa học</h1>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a th:href="@{/admin/dashboard}">Admin</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/admin/courses}">Khóa học</a></li>
                    <li class="breadcrumb-item active" th:text="${pageTitle}">Form</li>
                </ol>
            </nav>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/admin/courses}" class="btn-ghost"><i class="fas fa-arrow-left"></i> Quay lại</a>
        </div>
    </div>

    <div class="card">
        <div class="card-header-clean">
            <h5>Thông tin khóa học</h5>
        </div>
        <div class="card-body" style="padding:1.25rem;">
            <form th:action="${formAction}" method="post" class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Mã khóa học *</label>
                    <input type="text" name="code" class="form-control" placeholder="VD: KH-001"
                           th:value="${course.code}">
                    <div class="text-danger" style="font-size:0.75rem;" th:if="${errors != null && errors['code'] != null}" th:text="${errors['code']}"></div>
                </div>
                <div class="col-md-8">
                    <label class="form-label">Tên khóa học *</label>
                    <input type="text" name="name" class="form-control" placeholder="Tên khóa học"
                           th:value="${course.name}">
                    <div class="text-danger" style="font-size:0.75rem;" th:if="${errors != null && errors['name'] != null}" th:text="${errors['name']}"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Môn học *</label>
                    <select name="subjectId" class="form-select">
                        <option value="" disabled th:selected="${course.subject == null}">Chọn môn học</option>
                        <option th:each="subject : ${subjects}"
                                th:value="${subject.id}"
                                th:text="${subject.name}"
                                th:selected="${course.subject != null and subject.id == course.subject.id}"></option>
                    </select>
                    <div class="text-danger" style="font-size:0.75rem;" th:if="${errors != null && errors['subjectId'] != null}" th:text="${errors['subjectId']}"></div>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Số buổi</label>
                    <input type="number" name="sessionsCount" class="form-control"
                           th:value="${course.sessionsCount}">
                    <div class="text-danger" style="font-size:0.75rem;" th:if="${errors != null && errors['sessionsCount'] != null}" th:text="${errors['sessionsCount']}"></div>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Số tuần</label>
                    <input type="number" name="durationWeeks" class="form-control"
                           th:value="${course.durationWeeks}">
                    <div class="text-danger" style="font-size:0.75rem;" th:if="${errors != null && errors['durationWeeks'] != null}" th:text="${errors['durationWeeks']}"></div>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Học phí</label>
                    <input type="number" name="fee" step="0.01" class="form-control"
                           th:value="${course.fee}">
                    <div class="text-danger" style="font-size:0.75rem;" th:if="${errors != null && errors['fee'] != null}" th:text="${errors['fee']}"></div>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Trạng thái</label>
                    <select name="status" class="form-select">
                        <option value="" th:selected="${course.status == null}">Chưa đặt</option>
                        <option th:each="status : ${statuses}"
                                th:value="${status}"
                                th:text="${status == T(com.example.project.entity.ClassStatus).DANG_HOC ? 'Đang học' : (status == T(com.example.project.entity.ClassStatus).KET_THUC ? 'Kết thúc' : 'Mới')}"
                                th:selected="${course.status != null and status == course.status}"></option>
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label">Mô tả</label>
                    <textarea name="description" class="form-control" rows="4"
                              placeholder="Mô tả khóa học" th:text="${course.description}"></textarea>
                </div>
                <div class="col-12 d-flex justify-content-end gap-2">
                    <a th:href="@{/admin/courses}" class="btn-ghost">Hủy</a>
                    <button type="submit" class="btn-primary-solid">Lưu</button>
                </div>
            </form>
        </div>
    </div>

</div>
</div>
