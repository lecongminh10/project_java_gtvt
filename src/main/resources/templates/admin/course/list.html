<div layout:decorate="~{admin/layout/admin-layout}">
    <div layout:fragment="content">

        <!-- Page Header -->
        <div class="page-header d-flex flex-wrap justify-content-between align-items-center gap-2">
            <div>
                <h1>Quản lý khóa học</h1>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-0">
                        <li class="breadcrumb-item"><a th:href="@{/admin/dashboard}">Admin</a></li>
                        <li class="breadcrumb-item active">Khóa học</li>
                    </ol>
                </nav>
            </div>
            <div class="d-flex gap-2">
                <a th:href="@{/admin/courses/create}" class="btn-primary-solid"><i class="fas fa-plus"></i> Thêm khóa học</a>
            </div>
        </div>

        <!-- Filter Bar -->
        <div class="card mb-3">
            <div class="card-header-clean">
                <form th:action="@{/admin/courses}" method="get" class="d-flex align-items-center gap-2" style="flex:1;">
                    <div class="topbar-search" style="max-width:360px;">
                        <i class="fas fa-search"></i>
                        <input type="text" name="courseName" placeholder="Tìm theo mã hoặc tên khóa học..." th:value="${courseName}">
                    </div>
                    <select name="status" class="filter-select" th:value="${courseStatus}">
                        <option value="">Tất cả trạng thái</option>
                        <option th:each="s : ${T(com.example.project.entity.ClassStatus).values()}"
                                th:selected="${courseStatus == s}"
                                th:text="${s.label}"
                                th:value="${s}">
                        </option>
                    </select>
                    <button class="btn-ghost" type="submit"><i class="fas fa-filter"></i> Tìm kiếm</button>
                    <button class="btn-ghost" type="button" onclick="resetSearchForm()"><i class="fas fa-rotate-left"></i> Đặt lại</button>
                </form>
            </div>
        </div>

        <!-- Table -->
        <div class="card">
            <div class="table-responsive">
                <table class="table-admin">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Mã khóa học</th>
                        <th>Tên khóa học</th>
                        <th>Môn học</th>
                        <th>Số buổi</th>
                        <th>Học phí</th>
                        <th>Thời lượng</th>
                        <th>Trạng thái</th>
                        <th class="text-end">Hành động</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="course : ${courses}">
                        <td><span style="font-weight:600; color: #2563eb;" th:text="${course.id}"></span></td>
                        <td><span style="font-weight:600; color: #2563eb;" th:text="${course.code}"></span></td>
                        <td th:text="${course.name}"></td>
                        <td style="color: #64748b;" th:text="${course.subjectName}"></td>
                        <td th:text="${course.sessionsCount}"></td>
                        <td style="font-weight: 600;" th:text="${course.fee}"></td>
                        <td style="color: #64748b;" th:text="${course.durationWeeks + ' tuần'}"></td>
                        <td>
                            <span class="badge-status"
                                  th:classappend="${course.status?.name() == 'MOI' ? 'badge-success' : (course.status?.name() == 'DANG_HOC' ? 'badge-info' : 'badge-pending')}"
                                  th:text="${course.status != null ? course.status.label : 'Chưa xác định'}"></span>
                        </td>
                        <td class="text-end">
                            <div class="d-flex gap-1 justify-content-end">
                                <a class="btn-icon" th:href="@{/admin/courses/{id}/edit(id=${course.id})}" title="Sửa">
                                    <i class="fas fa-pencil"></i>
                                </a>
                                                                <form th:if="${course.status?.name() == 'KET_THUC'}" data-confirm="true"
                                                                            data-confirm-message="Bạn chắc chắn muốn xóa khóa học này?"
                                                                            th:action="@{/admin/courses/{id}/delete(id=${course.id})}" method="post" style="display:inline;">
                                                                        <button type="submit" class="btn-icon danger" title="Xóa">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(courses)}">
                        <td colspan="9" class="text-center" style="color:#64748b; padding:1.5rem;">
                            Chưa có khóa học nào.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<script th:inline="javascript">
    function resetSearchForm() {
        window.location.href = "/admin/courses";
    }
</script>
