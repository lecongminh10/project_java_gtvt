<div layout:decorate="~{admin/layout/admin-layout}">
<div layout:fragment="content">
    <div class="container-fluid p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3">Update Contract: <span th:text="${teacherCode}"></span></h1>
            <a th:href="@{/admin/teachers/{id}(id=${teacherId})}" class="btn btn-secondary">Back to Teacher</a>
        </div>
        
        <div th:if="${error}" class="alert alert-danger"><span th:text="${error}"></span></div>
        
        <div class="card" style="max-width: 600px;">
            <div class="card-body">
                <form th:action="@{/admin/teachers/{id}/contract(id=${teacherId})}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Contract Start Date <span class="text-danger">*</span></label>
                        <input type="date" name="contractStartDate" class="form-control" th:value="${contractStartDate}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contract End Date (leave blank for ongoing contract)</label>
                        <input type="date" name="contractEndDate" class="form-control" th:value="${contractEndDate}">
                        <small class="text-muted">Leave blank if this is an ongoing/indefinite contract</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contract Type <span class="text-danger">*</span></label>
                        <select name="contractType" class="form-select" required>
                            <option value="">Select Contract Type</option>
                            <option value="FULL_TIME" th:selected="${contractType == 'FULL_TIME'}">Full Time</option>
                            <option value="PART_TIME" th:selected="${contractType == 'PART_TIME'}">Part Time</option>
                            <option value="FREELANCE" th:selected="${contractType == 'FREELANCE'}">Freelance</option>
                        </select>
                    </div>
                    <div class="alert alert-info mt-3">
                        <strong>Current Contract:</strong><br>
                        Start: <span th:text="${contractStartDate}"></span><br>
                        End: <span th:text="${contractEndDate}"></span> <span th:if="!${contractEndDate}" class="text-muted">(Ongoing)</span><br>
                        Type: <span th:text="${contractType}"></span>
                    </div>
                    <button type="submit" class="btn btn-primary">Update Contract</button>
                </form>
            </div>
        </div>
    </div>
</div>
