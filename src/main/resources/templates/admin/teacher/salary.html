<div layout:decorate="~{admin/layout/admin-layout}">
<div layout:fragment="content">
    <div class="container-fluid p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3">Update Salary: <span th:text="${teacherCode}"></span></h1>
            <a th:href="@{/admin/teachers/{id}(id=${teacherId})}" class="btn btn-secondary">Back to Teacher</a>
        </div>
        
        <div th:if="${error}" class="alert alert-danger"><span th:text="${error}"></span></div>
        
        <div class="card" style="max-width: 600px;">
            <div class="card-body">
                <form th:action="@{/admin/teachers/{id}/salary(id=${teacherId})}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Salary Amount</label>
                        <input type="number" name="salary" step="0.01" class="form-control" th:value="${salary}" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">Currency</label>
                                <select name="salaryCurrency" class="form-select" required>
                                    <option value="VND" th:selected="${salaryCurrency == 'VND'}">VND (Vietnamese Dong)</option>
                                    <option value="USD" th:selected="${salaryCurrency == 'USD'}">USD (US Dollar)</option>
                                    <option value="EUR" th:selected="${salaryCurrency == 'EUR'}">EUR (Euro)</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">Pay Period</label>
                                <select name="salaryPayPeriod" class="form-select" required>
                                    <option value="MONTHLY" th:selected="${salaryPayPeriod == 'MONTHLY'}">Monthly</option>
                                    <option value="HOURLY" th:selected="${salaryPayPeriod == 'HOURLY'}">Hourly</option>
                                    <option value="CONTRACT" th:selected="${salaryPayPeriod == 'CONTRACT'}">Per Contract</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="alert alert-info mt-3">
                        Current: <strong th:if="${salary}" th:text="${#numbers.formatDecimal(salary, 0, 'DEFAULT', 0, 'DEFAULT')} + ' ' + ${salaryCurrency} + ' (' + ${salaryPayPeriod} + ')'"></strong>
                        <strong th:if="!${salary}" class="text-muted">Not set</strong>
                    </div>
                    <button type="submit" class="btn btn-primary">Update Salary</button>
                </form>
            </div>
        </div>
    </div>
</div>
