<div layout:decorate="~{admin/layout/admin-layout}">
<div layout:fragment="content">
    <div class="container-fluid p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3">Add Performance Review: <span th:text="${teacherCode}"></span></h1>
            <a th:href="@{/admin/teachers/{id}(id=${teacherId})}" class="btn btn-secondary">Back to Teacher</a>
        </div>
        
        <div th:if="${error}" class="alert alert-danger"><span th:text="${error}"></span></div>
        
        <div class="card">
            <div class="card-body">
                <form th:action="@{/admin/teachers/{id}/performance-review(id=${teacherId})}" method="post">
                    <div class="mb-4">
                        <label class="form-label">Performance Rating <span class="text-danger">*</span></label>
                        <div class="rating-scale mb-3">
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="performanceRating" id="rating1" value="1.0" required>
                                <label class="form-check-label" for="rating1">1.0 - Poor (Below Expectations)</label>
                            </div>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="performanceRating" id="rating2" value="2.0">
                            <label class="form-check-label" for="rating2">2.0 - Unsatisfactory</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="performanceRating" id="rating3" value="3.0">
                            <label class="form-check-label" for="rating3">3.0 - Satisfactory</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="performanceRating" id="rating4" value="4.0">
                            <label class="form-check-label" for="rating4">4.0 - Good</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="performanceRating" id="rating5" value="5.0">
                            <label class="form-check-label" for="rating5">5.0 - Excellent (Exceeds Expectations)</label>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Review Notes</label>
                        <textarea name="performanceNotes" class="form-control" rows="6" placeholder="Enter detailed notes about the teacher's performance..."></textarea>
                    </div>
                    <div class="alert alert-info">
                        <strong>Previous Review:</strong><br>
                        <span th:if="${lastPerformanceReviewDate}">
                            Rating: <span th:text="${lastPerformanceRating}"></span> / 5.0<br>
                            Date: <span th:text="${#temporals.format(lastPerformanceReviewDate, 'dd/MM/yyyy HH:mm')}"></span><br>
                            Notes: <span th:text="${lastReviewerNotes}"></span>
                        </span>
                        <span th:if="!${lastPerformanceReviewDate}" class="text-muted">No previous reviews</span>
                    </div>
                    <button type="submit" class="btn btn-primary">Record Performance Review</button>
                </form>
            </div>
        </div>
    </div>
</div>
