<div layout:decorate="~{admin/layout/admin-layout}">
<div layout:fragment="content">

    <div class="page-header d-flex flex-wrap justify-content-between align-items-center gap-2">
        <div>
            <h1>Quản lý giáo viên</h1>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a th:href="@{/admin/dashboard}">Admin</a></li>
                    <li class="breadcrumb-item active">Giáo viên</li>
                </ol>
            </nav>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/admin/teachers/new}" class="btn-primary-solid"><i class="fas fa-user-plus"></i> Thêm giáo viên</a>
        </div>
    </div>

    <div class="card mb-3">
        <div class="card-header-clean">
            <form method="get" class="d-flex align-items-center gap-2 flex-wrap admin-filter" style="flex:1;">
                <div class="topbar-search" style="max-width:360px;">
                    <i class="fas fa-search"></i>
                    <input type="text" name="search" placeholder="Tìm theo mã, tên hoặc email..." th:value="${search}">
                </div>
                <select name="status" class="form-select">
                    <option value="">Tất cả trạng thái</option>
                    <option th:each="s : ${statuses}"
                            th:value="${s}"
                            th:selected="${selectedStatus == s}"
                            th:text="${s == T(com.example.project.entity.UserStatus).ACTIVE ? 'Hoạt động' : 'Ngừng'}"></option>
                </select>
                <label class="d-flex align-items-center gap-2" style="margin:0; font-size:0.85rem; color:#64748b;">
                    <input class="form-check-input" type="checkbox" name="expiringContracts" value="true" th:checked="${expiringContracts}">
                    HĐ sắp hết hạn
                </label>
                <button type="submit" class="btn-ghost"><i class="fas fa-filter"></i> Tìm kiếm</button>
                <button type="button" class="btn-ghost" onclick="window.location.href='/admin/teachers'"><i class="fas fa-rotate-left"></i> Đặt lại</button>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="table-responsive">
            <table class="table-admin">
                <thead>
                    <tr>
                        <th>Mã GV</th>
                        <th>Họ tên</th>
                        <th>Email</th>
                        <th>Trạng thái</th>
                        <th>HĐ kết thúc</th>
                        <th>Lương</th>
                        <th class="text-end">Hành động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="teacher : ${teachers}">
                        <td><strong th:text="${teacher.code}"></strong></td>
                        <td th:text="${teacher.name}"></td>
                        <td th:text="${teacher.email}"></td>
                        <td>
                            <span th:if="${teacher.status == T(com.example.project.entity.UserStatus).ACTIVE}" class="badge-status badge-success">Hoạt động</span>
                            <span th:if="${teacher.status == T(com.example.project.entity.UserStatus).INACTIVE}" class="badge-status badge-pending">Ngừng</span>
                        </td>
                        <td>
                            <span th:if="${teacher.contractEndDate}" th:text="${#temporals.format(teacher.contractEndDate, 'dd/MM/yyyy')}"></span>
                            <span th:unless="${teacher.contractEndDate}" class="text-muted">Đang hiệu lực</span>
                        </td>
                        <td>
                            <span th:if="${teacher.salary}" th:text="${#numbers.formatDecimal(teacher.salary, 0, 'DEFAULT', 0, 'DEFAULT')} + ' ' + ${teacher.salaryCurrency}"></span>
                            <span th:unless="${teacher.salary}">-</span>
                        </td>
                        <td class="text-end">
                            <div class="d-flex gap-1 justify-content-end">
                                <a th:href="@{/admin/teachers/{id}(id=${teacher.id})}" class="btn-icon" title="Xem">
                                    <i class="fas fa-eye"></i>
                                </a>
                                <a th:href="@{/admin/teachers/{id}/edit(id=${teacher.id})}" class="btn-icon" title="Sửa">
                                    <i class="fas fa-pencil"></i>
                                </a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(teachers)}">
                        <td colspan="7" class="text-center" style="color:#64748b; padding:1.5rem;">Chưa có giáo viên.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <nav th:if="${totalPages > 1}" aria-label="Page navigation" class="mt-4">
        <ul class="pagination justify-content-center">
            <li th:classappend="${page == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/teachers(page=${page-1},size=${size},search=${search},status=${selectedStatus},expiringContracts=${expiringContracts})}">Trước</a>
            </li>
            <li th:each="pageNum : ${#numbers.sequence(0, totalPages-1)}" th:classappend="${page == pageNum} ? 'active'">
                <a class="page-link" th:href="@{/admin/teachers(page=${pageNum},size=${size},search=${search},status=${selectedStatus},expiringContracts=${expiringContracts})}" th:text="${pageNum + 1}"></a>
            </li>
            <li th:classappend="${page == totalPages - 1} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/teachers(page=${page+1},size=${size},search=${search},status=${selectedStatus},expiringContracts=${expiringContracts})}">Sau</a>
            </li>
        </ul>
    </nav>

</div>
