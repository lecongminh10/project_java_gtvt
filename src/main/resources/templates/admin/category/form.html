<div layout:decorate="~{admin/layout/admin-layout}">
<div layout:fragment="content">

    <!-- Page Header -->
    <div class="page-header d-flex justify-content-between align-items-center">
        <div>
            <h1 th:text="${pageTitle}">Danh mục</h1>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a th:href="@{/admin/dashboard}">Admin</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/admin/categories}">Danh mục</a></li>
                    <li class="breadcrumb-item active" th:text="${pageTitle}">Form</li>
                </ol>
            </nav>
        </div>
        <a th:href="@{/admin/categories}" class="btn-ghost">
            <i class="fas fa-arrow-left"></i> Quay lại
        </a>
    </div>

    <!-- Form Card -->
    <div class="card" style="max-width: 600px;">
        <div class="card-header-clean">
            <h5 th:text="${category.id != null} ? 'Cập nhật danh mục' : 'Thêm danh mục mới'">Form</h5>
        </div>

        <!-- Dùng chung 1 form cho cả CREATE và UPDATE -->
        <!-- Nếu có ID → gửi đến /edit, không có ID → gửi đến /create -->
        <form th:if="${category.id == null}"
              th:action="@{/admin/categories/create}"
              th:object="${category}"
              method="post"
              style="padding: 1.25rem;">

            <div class="form-input-wrap" style="margin-bottom:1rem;">
                <label class="form-label-clean">Tên danh mục <span style="color:red;">*</span></label>
                <input type="text"
                       class="form-control-clean"
                       th:field="*{name}"
                       placeholder="VD: Điện thoại, Laptop..."
                       required>
            </div>

            <div class="form-input-wrap" style="margin-bottom:1.5rem;">
                <label class="form-label-clean">Mô tả</label>
                <textarea class="form-control-clean"
                          th:field="*{description}"
                          rows="4"
                          placeholder="Mô tả ngắn về danh mục này..."></textarea>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn-primary-solid">
                    <i class="fas fa-plus"></i> Tạo danh mục
                </button>
                <a th:href="@{/admin/categories}" class="btn-ghost">Hủy</a>
            </div>
        </form>

        <form th:if="${category.id != null}"
              th:action="@{/admin/categories/{id}/edit(id=${category.id})}"
              th:object="${category}"
              method="post"
              style="padding: 1.25rem;">

            <div class="form-input-wrap" style="margin-bottom:1rem;">
                <label class="form-label-clean">Tên danh mục <span style="color:red;">*</span></label>
                <input type="text"
                       class="form-control-clean"
                       th:field="*{name}"
                       placeholder="VD: Điện thoại, Laptop..."
                       required>
            </div>

            <div class="form-input-wrap" style="margin-bottom:1.5rem;">
                <label class="form-label-clean">Mô tả</label>
                <textarea class="form-control-clean"
                          th:field="*{description}"
                          rows="4"
                          placeholder="Mô tả ngắn về danh mục này..."></textarea>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn-primary-solid">
                    <i class="fas fa-save"></i> Lưu thay đổi
                </button>
                <a th:href="@{/admin/categories}" class="btn-ghost">Hủy</a>
            </div>
        </form>
    </div>

</div>
</div>
