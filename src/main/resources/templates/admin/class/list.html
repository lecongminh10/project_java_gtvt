<div layout:decorate="~{admin/layout/admin-layout}">
<div layout:fragment="content">

    <!-- Page Header -->
    <div class="page-header d-flex flex-wrap justify-content-between align-items-center gap-2">
        <div>
            <h1>Quản lý lớp học</h1>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a th:href="@{/admin/dashboard}">Admin</a></li>
                    <li class="breadcrumb-item active">Lớp học</li>
                </ol>
            </nav>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/admin/classes/new}" class="btn-primary-solid"><i class="fas fa-plus"></i> Thêm lớp</a>
        </div>
    </div>

    <!-- Filter Bar -->
    <div class="card mb-3">
        <div class="card-header-clean">
            <form th:action="@{/admin/classes}" method="get" class="d-flex align-items-center gap-2" style="flex:1;">
                <div class="topbar-search" style="max-width:360px;">
                    <i class="fas fa-search"></i>
                    <input type="text" name="q" placeholder="Tìm theo mã, tên lớp, khóa học, giáo viên..." th:value="${keyword}">
                </div>
                <button class="btn-ghost" type="submit"><i class="fas fa-filter"></i> Tìm kiếm</button>
                <button class="btn-ghost" type="button" onclick="window.location.href='/admin/classes'"><i class="fas fa-rotate-left"></i> Reset</button>
            </form>
        </div>
    </div>

    <!-- Table -->
    <div class="card">
        <div class="table-responsive">
            <table class="table-admin">
                <thead>
                    <tr>
                        <th>Mã lớp</th>
                        <th>Tên lớp</th>
                        <th>Khóa học</th>
                        <th>Giáo viên</th>
                        <th>Trạng thái</th>
                        <th>Ngày bắt đầu</th>
                        <th>Ngày kết thúc</th>
                        <th class="text-end">Hành động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="clazz : ${classes}">
                        <td th:text="${clazz.code}"></td>
                        <td th:text="${clazz.name}"></td>
                        <td th:text="${clazz.course != null ? clazz.course.name : '-'}"></td>
                        <td th:text="${clazz.teacher != null ? clazz.teacher.name : '-'}"></td>
                        <td>
                            <span th:if="${clazz.status != null}"
                                  class="badge-status"
                                  th:classappend="${clazz.status == T(com.example.project.entity.ClassStatus).DANG_HOC ? ' badge-success' : (clazz.status == T(com.example.project.entity.ClassStatus).KET_THUC ? ' badge-danger' : ' badge-info')}">
                                <span th:text="${clazz.status == T(com.example.project.entity.ClassStatus).DANG_HOC ? 'Đang học' : (clazz.status == T(com.example.project.entity.ClassStatus).KET_THUC ? 'Kết thúc' : 'Mới')}"></span>
                            </span>
                            <span th:if="${clazz.status == null}" class="badge-status badge-pending">Chưa đặt</span>
                        </td>
                        <td th:text="${clazz.startDate != null ? #temporals.format(clazz.startDate, 'dd/MM/yyyy') : '-'}"></td>
                        <td th:text="${clazz.endDate != null ? #temporals.format(clazz.endDate, 'dd/MM/yyyy') : '-'}"></td>
                        <td class="text-end">
                            <div class="d-flex gap-1 justify-content-end">
                                <a th:href="@{/admin/classes/{id}(id=${clazz.id})}" class="btn-icon" title="Xem"><i class="fas fa-eye"></i></a>
                                <a th:if="${clazz.status != T(com.example.project.entity.ClassStatus).KET_THUC}"
                                   th:href="@{/admin/classes/{id}/edit(id=${clazz.id})}" class="btn-icon" title="Sửa"><i class="fas fa-pencil"></i></a>
                                                                <form th:if="${clazz.status != T(com.example.project.entity.ClassStatus).DANG_HOC}"
                                                                            th:action="@{/admin/classes/{id}/delete(id=${clazz.id})}" method="post" style="display:inline;"
                                                                            data-confirm="true" data-confirm-message="Bạn chắc chắn muốn xóa lớp học này?">
                                                                        <button type="submit" class="btn-icon danger" title="Xóa">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </form>
                                <a th:if="${clazz.status == T(com.example.project.entity.ClassStatus).KET_THUC}"
                                   th:href="@{/admin/classes/{id}/transfer(id=${clazz.id})}"
                                   class="btn-primary-solid" style="padding:0.35rem 0.75rem; font-size:0.8rem;">
                                    <i class="fas fa-exchange-alt"></i> Chuyển lớp
                                </a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(classes)}">
                        <td colspan="8" class="text-center" style="color:#64748b; padding:1.5rem;">
                            Chưa có lớp học nào.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</div>
