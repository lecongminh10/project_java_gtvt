<div layout:decorate="~{admin/layout/admin-layout}">
    <div layout:fragment="content">

        <!-- Page Header -->
        <div class="page-header d-flex flex-wrap justify-content-between align-items-center gap-2">
            <div>
                <h1>Quản lý môn học</h1>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-0">
                        <li class="breadcrumb-item"><a th:href="@{/admin/dashboard}">Admin</a></li>
                        <li class="breadcrumb-item active">Môn học</li>
                    </ol>
                </nav>
            </div>
            <div class="d-flex gap-2">
                <a th:href="@{/admin/subjects/create}" class="btn-primary-solid"><i class="fas fa-plus"></i> Thêm môn</a>
            </div>
        </div>

        <!-- Filter Bar -->
        <div class="card mb-3">
            <div class="card-header-clean">
                <form th:action="@{/admin/subjects}" method="get" class="d-flex align-items-center gap-2" style="flex:1;">
                    <div class="topbar-search" style="max-width:360px;">
                        <i class="fas fa-search"></i>
                        <input type="text" name="subjectName" placeholder="Tìm theo mã hoặc tên môn..." th:value="${subjectName}">
                    </div>
                    <select name="subjectLevel" class="filter-select" th:value="${subjectLevel}">
                        <option value="">Tất cả cấp học</option>
                        <option th:each="s : ${T(com.example.project.entity.SubjectLevel).values()}"
                                th:selected="${subjectLevel == s}"
                                th:text="${s}"
                                th:value="${s}">
                        </option>
                    </select>
                    <button class="btn-ghost" type="submit"><i class="fas fa-filter"></i> Tìm kiếm</button>
                    <button class="btn-ghost" type="button" onclick="resetSearchForm()"><i class="fas fa-rotate-left"></i> Đặt lại</button>
                </form>
            </div>
        </div>

        <!-- Table -->
        <div class="card">
            <div class="table-responsive">
                <table class="table-admin">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Mã Code</th>
                            <th>Tên</th>
                            <th>Cấp học</th>
                            <th>Mô tả</th>
                            <th class="text-end">Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="subject: ${subjects}">
                            <td><span style="font-weight:600; color: #2563eb;" th:text="${subject.id}"></span></td>
                            <td><span style="font-weight:600; color: #2563eb;" th:text="${subject.code}"></span></td>
                            <td th:text="${subject.name}"></td>
                            <td>
                                <span class="badge-status"
                                      th:classappend="${subject.level == 'THCS' ? 'badge-info' : (subject.level == 'THPT' ? 'badge-success' : 'badge-pending')}"
                                      th:text="${subject.level}"></span>
                            </td>
                            <td style="color: #64748b;" th:text="${subject.description}"></td>
                            <td class="text-end">
                                <div class="d-flex gap-1 justify-content-end">
                                    <a th:href="@{/admin/subjects/{id}/edit(id=${subject.id})}" class="btn-icon" title="Sửa">
                                        <i class="fas fa-pencil"></i>
                                    </a>
                                    <form th:action="@{/admin/subjects/{id}/delete(id=${subject.id})}" method="post" style="display:inline;"
                                          data-confirm="true" data-confirm-message="Bạn chắc chắn muốn xóa môn học này?">
                                        <button type="submit" class="btn-icon danger" title="Xóa">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(subjects)}">
                            <td colspan="6" class="text-center" style="color:#64748b; padding:1.5rem;">
                                Chưa có môn học nào.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>
<script th:inline="javascript">
    function resetSearchForm() {
        window.location.href = "/admin/subjects";
    }
</script>
