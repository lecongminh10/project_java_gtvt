<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/admin-layout}">
<head>
    <title>Admin Dashboard</title>
</head>
<body>
<div layout:fragment="content">

    <!-- Page Header -->
    <div class="page-header d-flex flex-wrap justify-content-between align-items-center gap-2">
        <div>
            <h1>Dashboard</h1>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a th:href="@{/admin/dashboard}">Admin</a></li>
                    <li class="breadcrumb-item active">Dashboard</li>
                </ol>
            </nav>
        </div>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-xl-3 col-md-6 col-sm-6">
            <div class="stat-card">
                <div class="stat-card-icon icon-violet"><i class="fas fa-user-graduate"></i></div>
                <div class="stat-card-body">
                    <div class="stat-card-label">Tổng học viên</div>
                    <div class="stat-card-value" id="studentCount" th:text="${studentCount}">0</div>
                </div>
            </div>
        </div>
        <div class="col-xl-3 col-md-6 col-sm-6">
            <div class="stat-card">
                <div class="stat-card-icon icon-green"><i class="fas fa-chalkboard"></i></div>
                <div class="stat-card-body">
                    <div class="stat-card-label">Tổng lớp học</div>
                    <div class="stat-card-value" id="classCount" th:text="${classCount}">0</div>
                </div>
            </div>
        </div>
        <div class="col-xl-3 col-md-6 col-sm-6">
            <div class="stat-card">
                <div class="stat-card-icon icon-blue"><i class="fas fa-chalkboard-teacher"></i></div>
                <div class="stat-card-body">
                    <div class="stat-card-label">Tổng giáo viên</div>
                    <div class="stat-card-value" id="teacherCount" th:text="${teacherCount}">0</div>
                </div>
            </div>
        </div>
        <div class="col-xl-3 col-md-6 col-sm-6">
            <div class="stat-card">
                <div class="stat-card-icon icon-amber"><i class="fas fa-book-open"></i></div>
                <div class="stat-card-body">
                    <div class="stat-card-label">Tổng khóa học</div>
                    <div class="stat-card-value" id="courseCount" th:text="${courseCount}">0</div>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-3">
        <div class="col-lg-8">
            <div class="card">
                <div class="card-header-clean">
                    <h5><i class="fas fa-calendar-check me-2 text-primary"></i>Lớp học sắp tới</h5>
                </div>
                <div class="table-responsive">
                    <table class="table-admin">
                        <thead>
                            <tr>
                                <th>Tên lớp</th>
                                <th>Khóa học</th>
                                <th>Giáo viên</th>
                                <th>Trạng thái</th>
                                <th>Ngày tạo</th>
                            </tr>
                        </thead>
                        <tbody id="upcomingClassesBody">
                            <tr th:each="clazz : ${latestClasses}">
                                <td><span style="font-weight:600; color:#2563eb;" th:text="${clazz.name}"></span></td>
                                <td th:text="${clazz.courseName}"></td>
                                <td th:text="${clazz.teacherName}"></td>
                                <td>
                                    <span class="badge-status" th:classappend="${' ' + clazz.statusClass}">
                                        <span th:text="${clazz.statusLabel}"></span>
                                    </span>
                                </td>
                                <td style="color:#64748b;" th:text="${clazz.createdAt}"></td>
                            </tr>
                            <tr th:if="${latestClasses == null or #lists.isEmpty(latestClasses)}">
                                <td colspan="5" class="text-center" style="color:#64748b; padding:1.25rem;">
                                    Chưa có lớp học mới.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-lg-4 d-flex flex-column gap-3">
            <div class="card">
                <div class="card-header-clean">
                    <h5><i class="fas fa-bell me-2" style="color:#f59e0b;"></i>Hoạt động</h5>
                </div>
                <div id="activityList" style="padding:0.75rem 1rem;">
                    <div th:each="activity, iter : ${activities}" class="d-flex align-items-start gap-3 py-2"
                         th:style="${iter.index + 1 < #lists.size(activities)} ? 'border-bottom:1px solid #f1f5f9;' : ''">
                        <div class="stat-card-icon icon-blue" style="width:36px;height:36px;border-radius:50%;font-size:0.85rem;flex-shrink:0;">
                            <i th:class="${activity.iconClass}"></i>
                        </div>
                        <div style="flex:1;">
                            <div style="font-size:0.845rem;font-weight:600;color:#0f172a;" th:text="${activity.title}"></div>
                            <div style="font-size:0.75rem;color:#64748b;" th:text="${activity.detail}"></div>
                            <div style="font-size:0.7rem;color:#94a3b8;margin-top:4px;"
                                 th:text="${activity.timestamp != null ? #temporals.format(activity.timestamp, 'dd/MM/yyyy HH:mm') : ''}"></div>
                        </div>
                    </div>
                    <div th:if="${activities == null or #lists.isEmpty(activities)}" class="text-center" style="color:#64748b; padding:1rem 0;">
                        Chưa có hoạt động gần đây.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const classesBody = document.getElementById('upcomingClassesBody');
            const activityList = document.getElementById('activityList');
            const studentCount = document.getElementById('studentCount');
            const classCount = document.getElementById('classCount');
            const teacherCount = document.getElementById('teacherCount');
            const courseCount = document.getElementById('courseCount');

            function escapeHtml(value) {
                if (value === null || value === undefined) {
                    return '';
                }
                return String(value)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            }

            function renderClasses(items) {
                if (!classesBody) {
                    return;
                }
                if (!items || items.length === 0) {
                    classesBody.innerHTML = '<tr><td colspan="5" class="text-center" style="color:#64748b; padding:1.25rem;">Chưa có lớp học mới.</td></tr>';
                    return;
                }
                classesBody.innerHTML = items.map(item => {
                    const statusClass = item.statusClass ? ' ' + item.statusClass : '';
                    return '<tr>'
                        + '<td><span style="font-weight:600; color:#2563eb;">' + escapeHtml(item.name) + '</span></td>'
                        + '<td>' + escapeHtml(item.courseName) + '</td>'
                        + '<td>' + escapeHtml(item.teacherName) + '</td>'
                        + '<td><span class="badge-status' + escapeHtml(statusClass) + '"><span>' + escapeHtml(item.statusLabel) + '</span></span></td>'
                        + '<td style="color:#64748b;">' + escapeHtml(item.createdAt) + '</td>'
                        + '</tr>';
                }).join('');
            }

            function renderActivities(items) {
                if (!activityList) {
                    return;
                }
                if (!items || items.length === 0) {
                    activityList.innerHTML = '<div class="text-center" style="color:#64748b; padding:1rem 0;">Chưa có hoạt động gần đây.</div>';
                    return;
                }
                activityList.innerHTML = items.map((item, index) => {
                    const border = index + 1 < items.length ? 'border-bottom:1px solid #f1f5f9;' : '';
                    const iconClass = item.iconClass ? item.iconClass : 'fas fa-bolt';
                    return '<div class="d-flex align-items-start gap-3 py-2" style="' + border + '">'
                        + '<div class="stat-card-icon icon-blue" style="width:36px;height:36px;border-radius:50%;font-size:0.85rem;flex-shrink:0;">'
                        + '<i class="' + escapeHtml(iconClass) + '"></i>'
                        + '</div>'
                        + '<div style="flex:1;">'
                        + '<div style="font-size:0.845rem;font-weight:600;color:#0f172a;">' + escapeHtml(item.title) + '</div>'
                        + '<div style="font-size:0.75rem;color:#64748b;">' + escapeHtml(item.detail) + '</div>'
                        + '<div style="font-size:0.7rem;color:#94a3b8;margin-top:4px;">' + escapeHtml(item.timestamp) + '</div>'
                        + '</div>'
                        + '</div>';
                }).join('');
            }

            function refreshDashboard() {
                fetch('/admin/dashboard/data')
                    .then(response => response.ok ? response.json() : null)
                    .then(data => {
                        if (!data) {
                            return;
                        }
                        renderClasses(data.latestClasses || []);
                        renderActivities(data.activities || []);
                        if (data.counts) {
                            if (studentCount) studentCount.textContent = data.counts.studentCount ?? '0';
                            if (classCount) classCount.textContent = data.counts.classCount ?? '0';
                            if (teacherCount) teacherCount.textContent = data.counts.teacherCount ?? '0';
                            if (courseCount) courseCount.textContent = data.counts.courseCount ?? '0';
                        }
                    })
                    .catch(() => {
                        // Silently ignore fetch errors for periodic refresh.
                    });
            }

            refreshDashboard();
            setInterval(refreshDashboard, 5000);
        })();
    </script>

</div>
</body>
</html>
