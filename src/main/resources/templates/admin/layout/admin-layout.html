<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.springframework.org/security/tags">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE | ELC Management System">Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/admin-style.css">
</head>
<body>

<div id="wrapper">
    <!-- SIDEBAR - Hiển thị tùy theo role -->
    <div th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
        <div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>
    </div>

    <!-- Teacher Sidebar -->
    <div th:if="${#authorization.expression('hasRole(''TEACHER'')')}">
        <div th:replace="~{teacher/fragments/sidebar :: sidebar}"></div>
    </div>

    <!-- PAGE CONTENT -->
    <div id="page-content-wrapper">
        <!-- TOPBAR -->
        <div th:replace="~{admin/fragments/navbar :: navbar}"></div>

        <!-- MAIN CONTENT -->
        <main class="page-content">
            <div layout:fragment="content"></div>
        </main>
    </div>
    </div>
</div>

<div class="confirm-modal" id="globalConfirmModal">
    <div class="confirm-modal-card">
        <div class="confirm-modal-top">
            <div class="confirm-modal-icon">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <div>
                <h4 class="confirm-modal-title">Xác nhận hành động</h4>
                <p class="confirm-modal-text" id="globalConfirmMessage"></p>
            </div>
        </div>
        <div class="confirm-modal-actions">
            <button type="button" class="btn-ghost" id="globalConfirmCancel">Hủy bỏ</button>
            <button type="button" class="btn-danger-solid" id="globalConfirmOk">Xác nhận</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js" crossorigin="anonymous"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const toggle = document.getElementById('sidebarToggle');
        if (toggle) {
            toggle.addEventListener('click', () => {
                document.body.classList.toggle('sb-sidenav-toggled');
            });
        }

        const modal = document.getElementById('globalConfirmModal');
        const messageEl = document.getElementById('globalConfirmMessage');
        const btnCancel = document.getElementById('globalConfirmCancel');
        const btnOk = document.getElementById('globalConfirmOk');
        let pendingAction = null;
        let allowConfirmedSubmit = false;

        function openConfirm(message, action) {
            messageEl.textContent = message;
            pendingAction = action;
            modal.classList.add('is-open');
        }

        function closeConfirm() {
            modal.classList.remove('is-open');
            pendingAction = null;
        }

        btnCancel.addEventListener('click', closeConfirm);
        modal.addEventListener('click', (event) => {
            if (event.target === modal) {
                closeConfirm();
            }
        });
        btnOk.addEventListener('click', () => {
            if (typeof pendingAction === 'function') {
                pendingAction();
            }
            closeConfirm();
        });

        document.body.addEventListener('submit', (event) => {
            const form = event.target;
            if (!form || !form.matches('form[data-confirm="true"]')) {
                return;
            }
            if (allowConfirmedSubmit) {
                allowConfirmedSubmit = false;
                return;
            }
            event.preventDefault();
            const message = form.getAttribute('data-confirm-message') || 'Bạn chắc chắn muốn tiếp tục?';
            openConfirm(message, () => form.submit());
        });

        document.body.addEventListener('click', (event) => {
            const submitBtn = event.target.closest('form[data-confirm="true"] button[type="submit"]');
            if (!submitBtn) {
                return;
            }
            event.preventDefault();
            const form = submitBtn.closest('form');
            const message = form.getAttribute('data-confirm-message') || 'Bạn chắc chắn muốn tiếp tục?';
            openConfirm(message, () => {
                allowConfirmedSubmit = true;
                if (typeof form.requestSubmit === 'function') {
                    form.requestSubmit(submitBtn);
                } else {
                    form.submit();
                }
            });
        });

        document.body.addEventListener('click', (event) => {
            const link = event.target.closest('a[data-confirm="true"]');
            if (!link) {
                return;
            }
            event.preventDefault();
            const message = link.getAttribute('data-confirm-message') || 'Bạn chắc chắn muốn tiếp tục?';
            const href = link.getAttribute('href');
            openConfirm(message, () => {
                window.location.href = href;
            });
        });
    });
</script>
<script th:inline="javascript">
    const toastSuccess = /*[[${toastSuccess}]]*/ null;
    const toastError = /*[[${toastError}]]*/ null;

    toastr.options = {
        closeButton: true,
        progressBar: true,
        newestOnTop: true,
        positionClass: 'toast-top-right',
        timeOut: 3500
    };

    if (toastSuccess) {
        toastr.success(toastSuccess);
    }
    if (toastError) {
        toastr.error(toastError);
    }
</script>
</body>
</html>
