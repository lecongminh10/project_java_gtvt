<div layout:decorate="~{admin/layout/admin-layout}">
<div layout:fragment="content">

    <!-- Page Header -->
    <div class="page-header d-flex flex-wrap justify-content-between align-items-center gap-2">
        <div>
            <h1>User Management</h1>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a th:href="@{/admin}">Admin</a></li>
                    <li class="breadcrumb-item active">Users</li>
                </ol>
            </nav>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/admin/users/new}" class="btn btn-primary"><i class="fas fa-user-plus"></i> Create User</a>
        </div>
    </div>

    <!-- Alerts -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Filter Bar -->
    <div class="card mb-3">
        <div class="card-body">
            <form method="get" class="row g-3">
                <div class="col-md-5">
                    <input type="text" class="form-control" name="search" placeholder="Search username, name, email..." th:value="${search}">
                </div>
                <div class="col-md-3">
                    <select class="form-select" name="role">
                        <option value="">All Roles</option>
                        <option th:each="r : ${roles}" th:value="${r}" th:text="${r}" th:selected="${selectedRole == r}"></option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select class="form-select" name="status">
                        <option value="">All Status</option>
                        <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}" th:selected="${selectedStatus == s}"></option>
                    </select>
                </div>
                <div class="col-md-1">
                    <button type="submit" class="btn btn-outline-secondary w-100"><i class="fas fa-filter"></i></button>
                </div>
            </form>
        </div>
    </div>

    <!-- Table -->
    <div class="card">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Username</th>
                        <th>Full Name</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Employee Code</th>
                        <th>Created</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${users}">
                        <td><strong th:text="${user.username}"></strong></td>
                        <td th:text="${user.fullName}"></td>
                        <td th:text="${user.email}"></td>
                        <td>
                            <span th:if="${user.role == 'ADMIN'}" class="badge bg-danger">ADMIN</span>
                            <span th:if="${user.role == 'TEACHER'}" class="badge bg-info">TEACHER</span>
                        </td>
                        <td>
                            <span th:if="${user.status == 'ACTIVE'}" class="badge bg-success">ACTIVE</span>
                            <span th:if="${user.status == 'INACTIVE'}" class="badge bg-secondary">INACTIVE</span>
                        </td>
                        <td th:text="${user.employeeCode}"></td>
                        <td th:text="${#temporals.format(user.createdAt, 'dd/MM/yyyy')}"></td>
                        <td>
                            <a th:href="@{/admin/users/{id}(id=${user.id})}" class="btn btn-sm btn-info" title="View">
                                <i class="fas fa-eye"></i>
                            </a>
                            <a th:href="@{/admin/users/{id}/edit(id=${user.id})}" class="btn btn-sm btn-warning" title="Edit">
                                <i class="fas fa-edit"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${users.isEmpty()}">
                        <td colspan="8" class="text-center text-muted py-4">No users found</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Pagination -->
    <nav th:if="${totalPages > 1}" aria-label="Page navigation" class="mt-4">
        <ul class="pagination justify-content-center">
            <li th:classappend="${page == 0} ? 'disabled'"><a class="page-link" th:href="@{/admin/users(page=${page-1})}">Previous</a></li>
            <li th:each="p : ${#numbers.sequence(0, totalPages-1)}" th:classappend="${p == page} ? 'active'">
                <a class="page-link" th:href="@{/admin/users(page=${p})}" th:text="${p + 1}"></a>
            </li>
            <li th:classappend="${page == totalPages - 1} ? 'disabled'"><a class="page-link" th:href="@{/admin/users(page=${page+1})}">Next</a></li>
        </ul>
    </nav>
</div>
</div>

                    <li class="page-item disabled"><a class="page-link" href="#">‹</a></li>
                    <li class="page-item active"><a class="page-link" href="#">1</a></li>
                    <li class="page-item disabled"><a class="page-link" href="#">›</a></li>
                </ul>
            </nav>
        </div>
    </div>

</div>
</div>
