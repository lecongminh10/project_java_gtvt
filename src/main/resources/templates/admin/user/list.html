<div layout:decorate="~{admin/layout/admin-layout}">
<div layout:fragment="content">

    <!-- Page Header -->
    <div class="page-header d-flex flex-wrap justify-content-between align-items-center gap-2">
        <div>
            <h1>Quản lý người dùng</h1>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a th:href="@{/admin/dashboard}">Admin</a></li>
                    <li class="breadcrumb-item active">Người dùng</li>
                </ol>
            </nav>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/admin/users/new}" class="btn-primary-solid"><i class="fas fa-user-plus"></i> Thêm người dùng</a>
        </div>
    </div>

    <!-- Filter Bar -->
        <div class="card mb-3">
            <div class="card-header-clean">
                <form method="get" class="d-flex align-items-center gap-2 flex-wrap admin-filter" style="flex:1;">
                    <div class="topbar-search" style="max-width:360px;">
                        <i class="fas fa-search"></i>
                        <input type="text" name="search" placeholder="Tìm theo username, tên, email, mã nhân viên..." th:value="${search}">
                    </div>
                    <select class="form-select" name="role">
                        <option value="">Tất cả vai trò</option>
                        <option th:each="r : ${roles}" th:value="${r}" th:text="${r}" th:selected="${selectedRole == r}"></option>
                    </select>
                    <select class="form-select" name="status">
                        <option value="">Tất cả trạng thái</option>
                        <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}" th:selected="${selectedStatus == s}"></option>
                    </select>
                    <button type="submit" class="btn-ghost"><i class="fas fa-filter"></i> Tìm kiếm</button>
                    <button type="button" class="btn-ghost" onclick="window.location.href='/admin/users'"><i class="fas fa-rotate-left"></i> Đặt lại</button>
                </form>
            </div>
        </div>

    <!-- Table -->
    <div class="card">
        <div class="table-responsive">
            <table class="table-admin">
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Họ tên</th>
                        <th>Email</th>
                        <th>Vai trò</th>
                        <th>Mã nhân viên</th>
                        <th>Trạng thái</th>
                        <th>Ngày tạo</th>
                        <th class="text-end">Hành động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${users}">
                        <td><strong th:text="${user.username}"></strong></td>
                        <td th:text="${user.fullName}"></td>
                        <td th:text="${user.email}"></td>
                        <td>
                            <span th:if="${user.role == T(com.example.project.entity.UserRole).ADMIN}" class="badge-status badge-danger">Quản trị</span>
                            <span th:if="${user.role == T(com.example.project.entity.UserRole).TEACHER}" class="badge-status badge-info">Giáo viên</span>
                        </td>
                        <td th:text="${user.employeeCode}"></td>
                        <td>
                            <span th:if="${user.status == T(com.example.project.entity.UserStatus).ACTIVE}" class="badge-status badge-success">Hoạt động</span>
                            <span th:if="${user.status == T(com.example.project.entity.UserStatus).INACTIVE}" class="badge-status badge-pending">Ngừng</span>
                        </td>
                        <td th:text="${#temporals.format(user.createdAt, 'dd/MM/yyyy')}"></td>
                        <td class="text-end">
                            <div class="d-flex gap-1 justify-content-end">
                                <a th:href="@{/admin/users/{id}(id=${user.id})}" class="btn-icon" title="Xem">
                                    <i class="fas fa-eye"></i>
                                </a>
                                <a th:href="@{/admin/users/{id}/edit(id=${user.id})}" class="btn-icon" title="Sửa">
                                    <i class="fas fa-pencil"></i>
                                </a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${users.isEmpty()}">
                        <td colspan="8" class="text-center" style="color:#64748b; padding:1.5rem;">Chưa có người dùng.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Pagination -->
    <nav th:if="${totalPages > 1}" aria-label="Page navigation" class="mt-4">
        <ul class="pagination justify-content-center">
            <li th:classappend="${page == 0} ? 'disabled'"><a class="page-link" th:href="@{/admin/users(page=${page-1})}">Trước</a></li>
            <li th:each="p : ${#numbers.sequence(0, totalPages-1)}" th:classappend="${p == page} ? 'active'">
                <a class="page-link" th:href="@{/admin/users(page=${p})}" th:text="${p + 1}"></a>
            </li>
            <li th:classappend="${page == totalPages - 1} ? 'disabled'"><a class="page-link" th:href="@{/admin/users(page=${page+1})}">Sau</a></li>
        </ul>
    </nav>
</div>
</div>
