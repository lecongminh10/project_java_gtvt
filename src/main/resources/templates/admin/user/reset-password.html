<div layout:decorate="~{admin/layout/admin-layout}">
<div layout:fragment="content">
    <div class="container-fluid p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3">Đặt lại mật khẩu</h1>
        </div>

        <div th:if="${error}" class="alert alert-danger"><span th:text="${error}"></span></div>

        <div class="card" style="max-width: 400px;">
            <div class="card-body">
                    <form th:action="@{/admin/users/{id}/reset-password(id=${userId})}" method="post" data-confirm="true"
                        data-confirm-message="Bạn chắc chắn muốn đặt lại mật khẩu?">
                    <div class="mb-3">
                        <label class="form-label">Mật khẩu mới (tối thiểu 6 ký tự)</label>
                        <input type="password" name="password" class="form-control" required minlength="6">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Xác nhận mật khẩu</label>
                        <input type="password" name="confirmPassword" class="form-control" required minlength="6">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Đặt lại mật khẩu</button>
                </form>
            </div>
        </div>
    </div>
</div>
