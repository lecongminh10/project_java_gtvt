<div layout:decorate="~{admin/layout/admin-layout}">
<div layout:fragment="content">
    <div class="container-fluid p-4">
        <h1 class="h3 mb-4">User Form</h1>
        
        <div th:if="${error}" class="alert alert-danger"><span th:text="${error}"></span></div>
        
        <form th:action="${user.id} ? @{/admin/users/{id}/edit(id=${user.id})} : @{/admin/users}" method="post" class="needs-validation">
            <div class="card">
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">Username</label>
                                <input type="text" name="username" class="form-control" th:value="${user.username}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Full Name</label>
                                <input type="text" name="fullName" class="form-control" th:value="${user.fullName}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" name="email" class="form-control" th:value="${user.email}">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">Phone</label>
                                <input type="tel" name="phone" class="form-control" th:value="${user.phone}">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Role</label>
                                <select name="role" class="form-select" required>
                                    <option value="">Select Role</option>
                                    <option th:each="r : ${roles}" th:value="${r}" th:text="${r}" th:selected="${user.role == r}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Status</label>
                                <select name="status" class="form-select">
                                    <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}" th:selected="${user.status == s}"></option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div th:if="!${user.id}">
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                    </div>
                </div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-primary">Save</button>
                <a th:href="@{/admin/users}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
</div>
