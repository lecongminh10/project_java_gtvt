<div layout:decorate="~{admin/layout/admin-layout}">
<div layout:fragment="content">
    <div class="container-fluid p-4">
        <h1 class="h3 mb-4">Thông tin người dùng</h1>

        <div th:if="${error}" class="alert alert-danger"><span th:text="${error}"></span></div>

          <form th:action="${user.id} ? @{/admin/users/{id}/edit(id=${user.id})} : @{/admin/users}" method="post" class="needs-validation" data-confirm="true"
              th:attr="data-confirm-message=${user.id == null ? 'Bạn chắc chắn muốn thêm người dùng này?' : 'Bạn chắc chắn muốn cập nhật người dùng này?'}">
            <div class="card">
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">Tên đăng nhập</label>
                                <input type="text" name="username" class="form-control" th:value="${user.username}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Mã nhân viên</label>
                                <input type="text" name="employeeCode" class="form-control" th:value="${user.employeeCode}" placeholder="Bắt buộc khi vai trò là giáo viên">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Họ tên</label>
                                <input type="text" name="fullName" class="form-control" th:value="${user.fullName}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" name="email" class="form-control" th:value="${user.email}">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">Số điện thoại</label>
                                <input type="tel" name="phone" class="form-control" th:value="${user.phone}">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Vai trò</label>
                                <select name="role" class="form-select" required>
                                    <option value="">Chọn vai trò</option>
                                    <option th:each="r : ${roles}" th:value="${r}" th:text="${r}" th:selected="${user.role == r}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Trạng thái</label>
                                <select name="status" class="form-select">
                                    <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}" th:selected="${user.status == s}"></option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div th:if="${user.id == null}" class="alert alert-info">
						Mật khẩu mặc định sẽ là <strong>12345678</strong>. Người dùng sẽ đổi mật khẩu sau khi đăng nhập.
                    </div>
                </div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-primary">Lưu</button>
                <a th:href="@{/admin/users}" class="btn btn-secondary">Hủy</a>
            </div>
        </form>
    </div>
</div>
</div>
