<div layout:decorate="~{admin/layout/admin-layout}">
<div layout:fragment="content">

    <div class="page-header d-flex flex-wrap justify-content-between align-items-center gap-2">
        <div>
            <h1>Thông tin người dùng</h1>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a th:href="@{/admin/dashboard}">Admin</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/admin/users}">Người dùng</a></li>
                    <li class="breadcrumb-item active">Chi tiết</li>
                </ol>
            </nav>
        </div>
    </div>

    <div class="row g-3">
        <div class="col-lg-8">
            <div class="card">
                <div class="card-header-clean">
                    <h5>Thông tin cơ bản</h5>
                </div>
                <div class="table-responsive">
                    <table class="table-admin">
                        <tbody>
                            <tr>
                                <td style="width: 200px; color: #64748b;">Tên đăng nhập</td>
                                <td><strong th:text="${user.username}"></strong></td>
                            </tr>
                            <tr>
                                <td style="color: #64748b;">Họ tên</td>
                                <td th:text="${user.fullName}"></td>
                            </tr>
                            <tr>
                                <td style="color: #64748b;">Email</td>
                                <td th:text="${user.email}"></td>
                            </tr>
                            <tr>
                                <td style="color: #64748b;">Số điện thoại</td>
                                <td th:text="${user.phone}"></td>
                            </tr>
                            <tr>
                                <td style="color: #64748b;">Mã nhân viên</td>
                                <td th:text="${user.employeeCode}"></td>
                            </tr>
                            <tr>
                                <td style="color: #64748b;">Vai trò</td>
                                <td>
                                    <span th:if="${user.role == T(com.example.project.entity.UserRole).ADMIN}" class="badge-status badge-danger">Quản trị</span>
                                    <span th:if="${user.role == T(com.example.project.entity.UserRole).TEACHER}" class="badge-status badge-info">Giáo viên</span>
                                </td>
                            </tr>
                            <tr>
                                <td style="color: #64748b;">Trạng thái</td>
                                <td>
                                    <span th:if="${user.status == T(com.example.project.entity.UserStatus).ACTIVE}" class="badge-status badge-success">Hoạt động</span>
                                    <span th:if="${user.status == T(com.example.project.entity.UserStatus).INACTIVE}" class="badge-status badge-pending">Ngừng</span>
                                </td>
                            </tr>
                            <tr>
                                <td style="color: #64748b;">Ngày tạo</td>
                                <td th:text="${#temporals.format(user.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                            </tr>
                            <tr>
                                <td style="color: #64748b;">Cập nhật</td>
                                <td th:text="${#temporals.format(user.updatedAt, 'dd/MM/yyyy HH:mm')}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card">
                <div class="card-header-clean">
                    <h5>Hành động</h5>
                </div>
                <div class="card-body" style="padding: 1rem;">
                    <div class="d-flex flex-column gap-2">
                        <a th:href="@{/admin/users/{id}/edit(id=${user.id})}" class="btn-primary-solid">
                            <i class="fas fa-pencil"></i> Chỉnh sửa thông tin
                        </a>
                        <a th:href="@{/admin/users/{id}/reset-password(id=${user.id})}" class="btn-ghost">
                            <i class="fas fa-key"></i> Đặt lại mật khẩu
                        </a>
                        <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post" data-confirm="true"
                              data-confirm-message="Bạn chắc chắn muốn ngừng hoạt động người dùng này?">
                            <button type="submit" class="btn-ghost" style="color: #dc2626; border-color: #fecaca; background: #fef2f2;">
                                <i class="fas fa-user-slash"></i> Ngừng hoạt động
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>
