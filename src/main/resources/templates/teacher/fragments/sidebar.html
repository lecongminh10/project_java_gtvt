<aside id="sidebar-wrapper" th:fragment="sidebar">

    <!-- Brand -->
    <a class="sidebar-brand" th:href="@{/teacher/dashboard}">
        <div class="sidebar-brand-icon">
            <i class="fas fa-chalkboard-user"></i>
        </div>
        <div class="sidebar-brand-text">
            ELC Teacher
            <span>Portal</span>
        </div>
    </a>

    <!-- Navigation -->
    <nav class="sidebar-nav">

        <div class="sidebar-section-label">Tổng quan</div>
        <a class="sidebar-item active" th:href="@{/teacher/dashboard}">
            <i class="fas fa-chart-pie"></i>
            <span>Dashboard</span>
        </a>

        <div class="sidebar-section-label">Giáo dục</div>
        <a class="sidebar-item" th:href="@{/teacher/classes}">
            <i class="fas fa-book"></i>
            <span>Lớp học của tôi</span>
        </a>
        <a class="sidebar-item" th:href="@{/teacher/schedule}">
            <i class="fas fa-calendar-alt"></i>
            <span>Lịch dạy</span>
        </a>
        <a class="sidebar-item" th:href="@{/teacher/students}">
            <i class="fas fa-users"></i>
            <span>Học sinh</span>
        </a>

        <div class="sidebar-section-label">Quản lý</div>
        <a class="sidebar-item" th:href="@{/teacher/attendance}">
            <i class="fas fa-list-check"></i>
            <span>Chấm công</span>
        </a>
        <a class="sidebar-item" th:href="@{/teacher/grades}">
            <i class="fas fa-star"></i>
            <span>Điểm số</span>
        </a>

        <div class="sidebar-section-label">Khác</div>
          <a class="sidebar-item" th:href="@{/teacher/documents}"
              th:classappend="${#httpServletRequest != null and #httpServletRequest.requestURI.startsWith('/teacher/documents')} ? ' active' : ''">
            <i class="fas fa-file-pdf"></i>
            <span>Tài liệu đào tạo</span>
        </a>
        <a class="sidebar-item" th:href="@{/teacher/account}">
            <i class="fas fa-user-circle"></i>
            <span>Hồ sơ của tôi</span>
        </a>

        <div class="sidebar-divider"></div>

        <a class="sidebar-item" th:href="@{/}">
            <i class="fas fa-globe"></i>
            <span>Xem website</span>
        </a>

    </nav>

    <!-- Footer -->
    <div class="sidebar-footer">
        <form id="logoutFormTeacher" th:action="@{/logout}" method="post" style="display: none;">
        </form>
        <a class="sidebar-item" href="javascript:void(0)" onclick="document.getElementById('logoutFormTeacher').submit();" style="padding-left: 0; color: #ef4444;">
            <i class="fas fa-sign-out-alt"></i>
            <span>Đăng xuất</span>
        </a>
    </div>

</aside>
