<div layout:decorate="~{admin/layout/admin-layout}">
<div layout:fragment="content">

    <div class="page-header d-flex flex-wrap justify-content-between align-items-center gap-2">
        <div>
            <h1>Tài khoản giáo viên</h1>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a th:href="@{/admin/dashboard}">Admin</a></li>
                    <li class="breadcrumb-item active">Tài khoản cá nhân</li>
                </ol>
            </nav>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/}" class="btn-ghost"><i class="fas fa-house"></i> Trang chủ</a>
        </div>
    </div>

    <div class="card" th:if="${hasTeacher}">
        <div class="card-header-clean d-flex justify-content-between align-items-start gap-3">
            <div>
                <h3 class="mb-1">Thông tin cá nhân</h3>
                <div style="color:#64748b; font-size:0.9rem;">Cập nhật các thông tin liên hệ để nhà trường dễ dàng kết nối.</div>
            </div>
            <span class="badge-admin-role"><i class="fas fa-id-badge me-1"></i><span th:text="${teacher.code}">GV001</span></span>
        </div>

        <div class="px-4 pt-3" th:if="${forcePasswordChange}">
            <div class="alert alert-warning">
                Vui lòng đổi mật khẩu trước khi sử dụng các chức năng khác.
            </div>
        </div>

        <div class="px-4 pt-3" th:if="${successMessage}">
            <div class="alert alert-success" th:text="${successMessage}"></div>
        </div>
        <div class="px-4 pt-3" th:if="${errorMessage}">
            <div class="alert alert-danger" th:text="${errorMessage}"></div>
        </div>

        <div class="card-body">
            <form th:action="@{/teacher/account}" method="post" th:object="${form}">
                <input type="hidden" name="id" th:value="${teacher.id}">
                <input type="hidden" name="username" th:value="${form.username}" th:if="${form.username}">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Họ và tên</label>
                        <input type="text" class="form-control" th:field="*{name}" placeholder="Nguyễn Văn A" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Tài khoản</label>
                        <input type="text" class="form-control" th:value="${form.username}" readonly>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" th:field="*{email}" placeholder="name@school.edu.vn">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Số điện thoại</label>
                        <input type="text" class="form-control" th:field="*{phone}" placeholder="090...">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Ngày sinh</label>
                        <input type="date" class="form-control" th:field="*{dob}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Trạng thái</label>
                        <input type="text" class="form-control" th:value="${teacher.status}" readonly>
                    </div>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn-primary-solid">
                        <i class="fas fa-save me-1"></i>Lưu
                    </button>
                    <a th:href="@{/teacher/account}" class="btn-ghost">Hủy</a>
                </div>
            </form>
        </div>
    </div>

    <div class="card" th:if="${!hasTeacher}">
        <div class="card-body d-flex align-items-center gap-3">
            <div class="btn-icon danger" style="pointer-events:none;"><i class="fas fa-circle-exclamation"></i></div>
            <div>
                <h5 class="mb-1">Chưa có giáo viên</h5>
                <div style="color:#64748b;">Không tìm thấy dữ liệu giáo viên để hiển thị.</div>
            </div>
        </div>
    </div>

    <div class="card mt-4" th:if="${hasTeacher}">
        <div class="card-header-clean">
            <h3 class="mb-0">Đổi mật khẩu</h3>
        </div>
        <div class="px-4 pt-3" th:if="${passwordSuccess}">
            <div class="alert alert-success" th:text="${passwordSuccess}"></div>
        </div>
        <div class="px-4 pt-3" th:if="${passwordError}">
            <div class="alert alert-danger" th:text="${passwordError}"></div>
        </div>
        <div class="card-body">
            <form th:action="@{/teacher/account/password}" method="post">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Mật khẩu hiện tại</label>
                        <input type="password" class="form-control" name="currentPassword" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Mật khẩu mới</label>
                        <input type="password" class="form-control" name="newPassword" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Xác nhận mật khẩu mới</label>
                        <input type="password" class="form-control" name="confirmPassword" required>
                    </div>
                </div>
                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn-primary-solid">
                        <i class="fas fa-key me-1"></i>Lưu
                    </button>
                </div>
            </form>
        </div>
    </div>

</div>
</div>
