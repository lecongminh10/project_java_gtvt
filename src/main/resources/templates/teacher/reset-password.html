<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset mật khẩu tài khoản</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Inter", Arial, sans-serif;
        }
        .reset-card {
            background: #ffffff;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.1);
            width: 100%;
            max-width: 480px;
        }
        .reset-card h1 {
            font-size: 1.4rem;
            margin-bottom: 0.5rem;
            color: #0f172a;
        }
        .reset-card p {
            color: #64748b;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
<div class="reset-card">
    <div th:if="${invalidToken == true}" class="alert alert-danger">
        Link không hợp lệ hoặc đã hết hạn.
    </div>
    <div th:if="${resetError}" class="alert alert-danger" th:text="${resetError}"></div>

    <div th:if="${invalidToken != true}">
        <h1>Reset mật khẩu</h1>
        <p>Nhập mật khẩu mới cho tài khoản của bạn.</p>
        <form th:action="@{/reset-password}" method="post">
            <input type="hidden" name="token" th:value="${token}" th:if="${token}">
            <div class="mb-3">
                <label class="form-label">Mật khẩu mới</label>
                <input type="password" class="form-control" name="newPassword" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Xác nhận mật khẩu</label>
                <input type="password" class="form-control" name="confirmPassword" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                Lưu
            </button>
        </form>
    </div>
</div>
</body>
</html>
