<div layout:decorate="~{admin/layout/admin-layout}"
     xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
     xmlns:th="http://www.thymeleaf.org">
<div layout:fragment="content">

    <div class="page-header d-flex flex-wrap justify-content-between align-items-center gap-2">
        <div>
            <h1>Chi tiet tai lieu</h1>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a th:href="@{/admin/dashboard}">Admin</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/teacher/documents}">Tai lieu dao tao</a></li>
                    <li class="breadcrumb-item active">Chi tiet</li>
                </ol>
            </nav>
        </div>
        <a class="btn-ghost" th:href="@{/teacher/documents}">
            <i class="fas fa-arrow-left me-1"></i>Quay lai
        </a>
    </div>

    <div class="card">
        <div class="card-body">
            <dl class="row mb-0">
                <dt class="col-sm-3">Ten tai lieu</dt>
                <dd class="col-sm-9" th:text="${document.name}">Tai lieu</dd>

                <dt class="col-sm-3">Loai</dt>
                <dd class="col-sm-9" th:text="${document.type}">GIAO_AN</dd>

                <dt class="col-sm-3">Mon hoc</dt>
                <dd class="col-sm-9" th:text="${document.subject != null ? document.subject.name : '-'}">-</dd>

                <dt class="col-sm-3">Khoa hoc</dt>
                <dd class="col-sm-9" th:text="${document.course != null ? document.course.name : '-'}">-</dd>

                <dt class="col-sm-3">Nguoi tai len</dt>
                <dd class="col-sm-9" th:text="${document.uploadBy != null ? document.uploadBy.fullName : '-'}">-</dd>

                <dt class="col-sm-3">Ngay tao</dt>
                <dd class="col-sm-9" th:text="${document.createdAt != null ? #temporals.format(document.createdAt, 'dd/MM/yyyy HH:mm') : '-'}">-</dd>
            </dl>

            <div class="mt-4 d-flex gap-2">
                <a class="btn-ghost" th:href="@{/teacher/documents/view/{id}(id=${document.id})}" target="_blank">
                    <i class="fas fa-file-lines me-1"></i>Xem tai lieu
                </a>
                <a class="btn-primary-solid" th:href="@{/teacher/documents/download/{id}(id=${document.id})}">
                    <i class="fas fa-download me-1"></i>Tai xuong
                </a>
            </div>
        </div>
    </div>

</div>
</div>
