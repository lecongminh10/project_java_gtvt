<div layout:decorate="~{admin/layout/admin-layout}"
     xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
     xmlns:th="http://www.thymeleaf.org">
<div layout:fragment="content">

    <div class="page-header d-flex flex-wrap justify-content-between align-items-center gap-2">
        <div>
            <h1>Chương trình đào tạo</h1>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a th:href="@{/admin/dashboard}">Admin</a></li>
                    <li class="breadcrumb-item active">Tài liệu đào tạo</li>
                </ol>
            </nav>
        </div>
    </div>

    <div class="alert alert-danger" th:if="${docError}" th:text="${docError}"></div>

    <div class="card mb-3">
        <div class="card-header-clean">
            <form class="d-flex flex-wrap gap-2" th:action="@{/teacher/documents}" method="get">
                <input class="form-control" type="text" name="keyword" th:value="${keyword}" placeholder="Tìm theo tên tài liệu...">
                <select class="form-select" name="subjectId">
                    <option value="">Tất cả môn học</option>
                    <option th:each="subject : ${subjects}"
                            th:value="${subject.id}"
                            th:text="${subject.name}"
                            th:selected="${subjectId != null and subjectId == subject.id}">
                    </option>
                </select>
                <select class="form-select" name="courseId">
                    <option value="">Tất cả khóa học</option>
                    <option th:each="course : ${courses}"
                            th:value="${course.id}"
                            th:text="${course.name}"
                            th:selected="${courseId != null and courseId == course.id}">
                    </option>
                </select>
                <button class="btn btn-primary" type="submit"><i class="fas fa-search me-1"></i>Tìm kiếm</button>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="table-responsive">
            <table class="table-admin">
                <thead>
                <tr>
                    <th style="width:60px;">STT</th>
                    <th>Tên tài liệu</th>
                    <th>Loại</th>
                    <th>Môn học</th>
                    <th>Khóa học</th>
                    <th>Ngày tạo</th>
                    <th class="text-end">Hành động</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${documents == null or #lists.isEmpty(documents)}">
                    <td colspan="7" class="text-center text-muted py-4">Chưa có tài liệu</td>
                </tr>
                <tr th:each="doc, iter : ${documents}">
                    <td th:text="${iter.count}">1</td>
                    <td th:text="${doc.name}">Tài liệu</td>
                    <td th:text="${doc.type}">GIAO_AN</td>
                    <td th:text="${doc.subject != null ? doc.subject.name : '-'}">-</td>
                    <td th:text="${doc.course != null ? doc.course.name : '-'}">-</td>
                    <td th:text="${doc.createdAt != null ? #temporals.format(doc.createdAt, 'dd/MM/yyyy') : '-'}">-</td>
                    <td class="text-end">
                        <div class="d-flex gap-1 justify-content-end">
                            <a class="btn-icon" th:href="@{/teacher/documents/{id}(id=${doc.id})}" title="Xem">
                                <i class="fas fa-eye"></i>
                            </a>
                            <a class="btn-icon" th:href="@{/teacher/documents/view/{id}(id=${doc.id})}" target="_blank" title="Xem tài liệu">
                                <i class="fas fa-file-lines"></i>
                            </a>
                            <a class="btn-icon" th:href="@{/teacher/documents/download/{id}(id=${doc.id})}" title="Tải xuống">
                                <i class="fas fa-download"></i>
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</div>
