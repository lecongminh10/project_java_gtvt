<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Thêm tài liệu</title>
  <meta charset="UTF-8">
</head>
<body>

<h2>Thêm tài liệu</h2>

<form th:action="@{/teacher/materials/save}"
      method="post"
      enctype="multipart/form-data"
      th:object="${material}">

  <label>Tiêu đề:</label>
  <input type="text" th:field="*{title}" required/>

  <label>File:</label>
  <input type="file" name="file" required/>

  <button type="submit">Lưu</button>
</form>

<a th:href="@{/teacher/materials}">Quay lại</a>

</body>
</html>
