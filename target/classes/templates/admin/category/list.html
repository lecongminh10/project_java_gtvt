<div layout:decorate="~{admin/layout/admin-layout}">
<div layout:fragment="content">

    <!-- Thông báo thành công / lỗi -->
    <div th:if="${success}" class="alert alert-success d-flex align-items-center gap-2 mb-3" style="border-radius:10px; font-size:0.875rem;">
        <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
    </div>
    <div th:if="${error}" class="alert alert-danger d-flex align-items-center gap-2 mb-3" style="border-radius:10px; font-size:0.875rem;">
        <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
    </div>

    <!-- Page Header -->
    <div class="page-header d-flex justify-content-between align-items-center">
        <div>
            <h1>Danh mục sản phẩm</h1>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a th:href="@{/admin/dashboard}">Admin</a></li>
                    <li class="breadcrumb-item active">Danh mục</li>
                </ol>
            </nav>
        </div>
        <a th:href="@{/admin/categories/create}" class="btn-primary-solid">
            <i class="fas fa-plus"></i> Thêm danh mục
        </a>
    </div>

    <!-- Table -->
    <div class="card">
        <div class="table-responsive">
            <table class="table-admin">
                <thead>
                    <tr>
                        <th style="width:60px;">ID</th>
                        <th>Tên danh mục</th>
                        <th>Mô tả</th>
                        <th class="text-end" style="width:140px;">Hành động</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Lặp qua danh sách từ Model -->
                    <tr th:each="cat : ${categories}">
                        <td style="color:#64748b;" th:text="${cat.id}">1</td>
                        <td style="font-weight:600; color:#0f172a;" th:text="${cat.name}">Điện thoại</td>
                        <td style="color:#64748b;" th:text="${cat.description}">Mô tả...</td>
                        <td class="text-end">
                            <div class="d-flex gap-1 justify-content-end">
                                <a th:href="@{/admin/categories/{id}/edit(id=${cat.id})}"
                                   class="btn-icon" title="Sửa">
                                    <i class="fas fa-pencil"></i>
                                </a>
                                <form th:action="@{/admin/categories/{id}/delete(id=${cat.id})}"
                                      method="post" style="display:inline;"
                                      onsubmit="return confirm('Bạn chắc chắn muốn xóa?')">
                                    <button type="submit" class="btn-icon danger" title="Xóa">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>

                    <!-- Trường hợp danh sách rỗng -->
                    <tr th:if="${#lists.isEmpty(categories)}">
                        <td colspan="4" class="text-center" style="padding:2rem; color:#64748b;">
                            <i class="fas fa-inbox fa-2x mb-2 d-block"></i>
                            Chưa có danh mục nào. <a th:href="@{/admin/categories/create}">Thêm mới</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Footer đếm số lượng -->
        <div style="padding: 0.75rem 1rem; border-top: 1px solid #e2e8f0; font-size:0.8rem; color:#64748b;">
            Tổng: <strong th:text="${#lists.size(categories)}">0</strong> danh mục
        </div>
    </div>

</div>
</div>
