<div layout:decorate="~{client/layout/client-layout}">
<div layout:fragment="content">
    <div class="auth-page">
        <div class="container">
            <div class="auth-card">
                <!-- Logo -->
                <div class="auth-logo">
                    <div class="auth-logo-icon"><i class="fas fa-bolt"></i></div>
                    <div class="auth-logo-name">TechStore</div>
                    <div class="auth-logo-sub">Công nghệ đỉnh cao · Giá cực tốt</div>
                </div>

                <h2 class="auth-title">Chào mừng trở lại!</h2>
                <p class="auth-subtitle">Đăng nhập để xem đơn hàng và ưu đãi của bạn</p>

                <!-- Alerts -->
                <div th:if="${param.error}" class="alert alert-danger alert-sm py-2" role="alert" style="font-size:0.845rem;">
                    <i class="fas fa-circle-exclamation me-2"></i>Tên đăng nhập hoặc mật khẩu không đúng.
                </div>
                <div th:if="${param.logout}" class="alert alert-success py-2" role="alert" style="font-size:0.845rem;">
                    <i class="fas fa-check-circle me-2"></i>Bạn đã đăng xuất thành công.
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="form-input-wrap">
                        <label class="form-label-clean" for="username">Tài khoản</label>
                        <input class="form-control-clean" type="text" id="username" name="username"
                               placeholder="Nhập email hoặc tên đăng nhập" required autofocus>
                    </div>
                    <div class="form-input-wrap">
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <label class="form-label-clean mb-0" for="password">Mật khẩu</label>
                            <a href="#" style="font-size:0.8rem; color: #2563eb; font-weight:500; text-decoration:none;">Quên mật khẩu?</a>
                        </div>
                        <input class="form-control-clean" type="password" id="password" name="password"
                               placeholder="Nhập mật khẩu" required>
                    </div>
                    <div class="d-flex align-items-center gap-2 mb-3">
                        <input type="checkbox" id="remember" class="form-check-input m-0">
                        <label for="remember" style="font-size:0.845rem; color:#334155; cursor:pointer;">Ghi nhớ đăng nhập</label>
                    </div>
                    <button type="submit" class="btn-auth">
                        <i class="fas fa-sign-in-alt me-2"></i>Đăng nhập
                    </button>
                </form>

                <div style="text-align:center; margin-top:1.25rem; font-size:0.845rem; color:#64748b;">
                    Chưa có tài khoản?
                    <a href="#" style="color:#2563eb; font-weight:600; text-decoration:none;"> Đăng ký ngay</a>
                </div>

                <!-- Divider -->
                <div style="display:flex; align-items:center; gap:0.75rem; margin: 1.25rem 0;">
                    <div style="flex:1; height:1px; background:#e2e8f0;"></div>
                    <span style="font-size:0.78rem; color:#94a3b8;">hoặc đăng nhập với</span>
                    <div style="flex:1; height:1px; background:#e2e8f0;"></div>
                </div>

                <div class="d-flex gap-2">
                    <a href="#" style="flex:1; display:flex; align-items:center; justify-content:center; gap:6px; padding:0.55rem; border:1.5px solid #e2e8f0; border-radius:10px; text-decoration:none; color:#334155; font-size:0.845rem; font-weight:600; transition:all 0.15s;">
                        <i class="fab fa-google" style="color:#ea4335;"></i> Google
                    </a>
                    <a href="#" style="flex:1; display:flex; align-items:center; justify-content:center; gap:6px; padding:0.55rem; border:1.5px solid #e2e8f0; border-radius:10px; text-decoration:none; color:#334155; font-size:0.845rem; font-weight:600; transition:all 0.15s;">
                        <i class="fab fa-facebook-f" style="color:#1877f2;"></i> Facebook
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
</div>
